<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>TRON 多签管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 14px 40px;
    }
    .header { text-align: center; margin-bottom: 20px; }
    .header-icon { font-size: 36px; margin-bottom: 6px; }
    .header h1 {
      font-size: 22px; font-weight: 800;
      background: linear-gradient(135deg, #e84142, #ff8c42);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header p { font-size: 13px; color: #8b949e; margin-top: 4px; }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 18px;
      padding: 20px;
      width: 100%;
      max-width: 460px;
      margin-bottom: 14px;
    }
    .card-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #8b949e; margin-bottom: 14px;
    }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 10px; font-size: 13px;
      margin-bottom: 14px;
    }
    .status-bar.off  { background:#1c2128; color:#8b949e; }
    .status-bar.on   { background:#0d2818; border:1px solid #1a4731; color:#3fb950; }
    .status-bar.err  { background:#2d1117; border:1px solid #5c2323; color:#f85149; }
    .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .dot.gray  { background:#484f58; }
    .dot.green { background:#3fb950; }
    .dot.red   { background:#f85149; }

    .wallet-grid { display: flex; flex-direction: column; gap: 10px; }
    .wallet-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: #0d1117;
      border: 1.5px solid #30363d;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .wallet-btn:hover { border-color: #e84142; background: #161b22; }
    .wallet-btn:active { transform: scale(0.98); }
    .wallet-btn.active { border-color: #3fb950; background: #0d2818; }
    .wlogo-wrap {
      width:44px; height:44px; border-radius:12px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:22px;
    }
    .wlogo-tl { background: linear-gradient(135deg,#e84142,#ff6b6b); }
    .wlogo-tp { background: linear-gradient(135deg,#2775CA,#54a0ff); }
    .wlogo-im { background: linear-gradient(135deg,#11C4D1,#00b894); }
    .winfo { flex: 1; }
    .wname { font-size: 15px; font-weight: 700; color: #e6edf3; }
    .wdesc { font-size: 12px; color: #8b949e; margin-top: 2px; }
    .wbadge {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: #21262d; color: #8b949e; font-weight: 600; white-space:nowrap;
    }
    .wallet-btn.active .wbadge { background: #1a4731; color: #3fb950; }

    .field { margin-bottom: 14px; }
    .field label { display:block; font-size:12px; color:#8b949e; margin-bottom:5px; font-weight:500; }
    .field input, .field select {
      width: 100%;
      background: #0d1117;
      border: 1.5px solid #30363d;
      border-radius: 10px;
      padding: 11px 13px;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: #e84142; }
    .field input::placeholder { color: #484f58; }
    .field input[readonly] { color: #8b949e; }
    .row2 { display: flex; gap: 10px; }
    .row2 .field { flex: 1; }

    .info { background:#161b22; border:1px solid #21262d; border-radius:10px; padding:11px 13px; font-size:12px; color:#8b949e; line-height:1.6; margin-bottom:14px; }
    .info strong { color:#e6edf3; }
    .warn { background:#2d1f00; border:1px solid #6e4c00; border-radius:10px; padding:11px 13px; font-size:12px; color:#d29922; line-height:1.6; margin-bottom:14px; }

    .preview {
      background:#0d1117; border:1px solid #21262d; border-radius:10px;
      padding:13px; font-size:11px; font-family:'SF Mono','Fira Code',monospace;
      color:#79c0ff; white-space:pre-wrap; word-break:break-all;
      max-height:150px; overflow-y:auto; margin-bottom:14px;
    }

    .btn {
      width:100%; padding:14px; border-radius:12px; border:none;
      font-size:15px; font-weight:700; cursor:pointer;
      transition: all 0.2s; margin-bottom:8px; display:block;
    }
    .btn:last-child { margin-bottom:0; }
    .btn-red  { background: linear-gradient(135deg,#e84142,#c0392b); color:#fff; }
    .btn-gray { background:#21262d; border:1.5px solid #30363d; color:#e6edf3; }
    .btn:hover:not(:disabled) { opacity:.88; transform:translateY(-1px); }
    .btn:disabled { opacity:.35; cursor:not-allowed; transform:none; }

    .result {
      border-radius:10px; padding:13px; font-size:12px;
      word-break:break-all; line-height:1.7; display:none;
    }
    .result.show { display:block; }
    .result.ok  { background:#0d2818; border:1px solid #1a4731; color:#3fb950; }
    .result.bad { background:#2d1117; border:1px solid #5c2323; color:#f85149; }

    .steps { display:flex; gap:5px; margin-bottom:18px; }
    .st { flex:1; height:3px; border-radius:2px; background:#21262d; transition:background .3s; }
    .st.active { background:#e84142; }
    .st.done   { background:#3fb950; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔐</div>
  <h1>TRON 多签管理</h1>
  <p>添加共签钱包 · 保留 Owner 所有权</p>
</div>

<div class="card" style="padding:14px 20px">
  <div id="statusBar" class="status-bar off">
    <div class="dot gray" id="statusDot"></div>
    <span id="statusText">请选择钱包连接</span>
  </div>
  <div class="steps">
    <div class="st active" id="s1"></div>
    <div class="st" id="s2"></div>
    <div class="st" id="s3"></div>
  </div>
</div>

<!-- Step 1 -->
<div class="card" id="cardWallet">
  <div class="card-label">步骤 1 — 选择钱包</div>
  <div class="wallet-grid">

    <div class="wallet-btn" id="btn-tronlink" onclick="connectWallet('tronlink')">
      <div class="wlogo-wrap wlogo-tl">🔴</div>
      <div class="winfo">
        <div class="wname">TronLink</div>
        <div class="wdesc">官方 TRON 钱包 · 插件 / App 内浏览器</div>
      </div>
      <div class="wbadge" id="badge-tronlink">连接</div>
    </div>

    <div class="wallet-btn" id="btn-tokenpocket" onclick="connectWallet('tokenpocket')">
      <div class="wlogo-wrap wlogo-tp">🔵</div>
      <div class="winfo">
        <div class="wname">TokenPocket</div>
        <div class="wdesc">多链钱包 · App 内置 DApp 浏览器</div>
      </div>
      <div class="wbadge" id="badge-tokenpocket">连接</div>
    </div>

    <div class="wallet-btn" id="btn-imtoken" onclick="connectWallet('imtoken')">
      <div class="wlogo-wrap wlogo-im">🟢</div>
      <div class="winfo">
        <div class="wname">imToken</div>
        <div class="wdesc">自托管钱包 · App 内置 DApp 浏览器</div>
      </div>
      <div class="wbadge" id="badge-imtoken">连接</div>
    </div>

  </div>
  <div id="connectErr" class="result bad" style="margin-top:12px"></div>
</div>

<!-- Step 2 -->
<div class="card" id="cardConfig" style="display:none">
  <div class="card-label">步骤 2 — 配置多签参数</div>

  <div class="warn">⚠️ 此操作不可逆，请务必核对共签地址无误后再确认签名。</div>

  <div class="field">
    <label>当前主账户（Owner）</label>
    <input type="text" id="ownerAddr" readonly placeholder="连接钱包后自动填入" />
  </div>

  <div class="field">
    <label>要添加的共签钱包地址</label>
    <input type="text" id="newSigner" placeholder="T... (TRON 地址，34位)" oninput="updatePreview()" />
  </div>

  <div class="row2">
    <div class="field">
      <label>签名门槛 (Threshold)</label>
      <select id="threshold" onchange="updatePreview()">
        <option value="1">1 — 任一签名者可操作</option>
        <option value="2">2 — 双方必须共同签名</option>
      </select>
    </div>
    <div class="field">
      <label>新签名者权重</label>
      <select id="weight" onchange="updatePreview()">
        <option value="1">1（标准）</option>
        <option value="2">2（高权重）</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label>权限类型</label>
    <select id="permType" onchange="updatePreview()">
      <option value="active">Active（推荐 — Owner 独占不变）</option>
      <option value="owner">Owner（最高权限 — 谨慎！）</option>
    </select>
  </div>

  <div class="card-label" style="margin-bottom:8px">权限结构预览</div>
  <div class="preview" id="permPreview">填写共签钱包地址后自动生成...</div>

  <button class="btn btn-red" id="btnSign" onclick="buildAndSign()" disabled>
    📝 构建并发起签名请求
  </button>
</div>

<!-- Step 3 -->
<div class="card" id="cardResult" style="display:none">
  <div class="card-label">步骤 3 — 交易结果</div>
  <div id="txResult" class="result show ok"></div>
  <button class="btn btn-gray" onclick="backToConfig()" style="margin-top:12px">← 返回修改</button>
</div>

<script>
  let tronWeb = null;
  let currentAddress = '';
  let walletType = '';

  function setStatus(type, text) {
    document.getElementById('statusBar').className = 'status-bar ' + type;
    document.getElementById('statusDot').className = 'dot ' +
      (type === 'on' ? 'green' : type === 'err' ? 'red' : 'gray');
    document.getElementById('statusText').textContent = text;
  }

  function setStep(n) {
    ['s1','s2','s3'].forEach((id, i) => {
      document.getElementById(id).className = 'st ' +
        (i+1 < n ? 'done' : i+1 === n ? 'active' : '');
    });
  }

  function showConnectErr(msg) {
    const el = document.getElementById('connectErr');
    el.textContent = msg;
    el.className = 'result bad show';
  }

  function isTron(addr) { return /^T[A-Za-z0-9]{33}$/.test(addr); }

  /* ── 连接钱包 ── */
  async function connectWallet(type) {
    ['tronlink','tokenpocket','imtoken'].forEach(t => {
      document.getElementById('btn-' + t).classList.remove('active');
      document.getElementById('badge-' + t).textContent = '连接';
    });
    document.getElementById('connectErr').className = 'result bad';
    setStatus('off', '连接中...');

    try {
      let tw = null;

      /* TronLink */
      if (type === 'tronlink') {
        if (typeof window.tronLink !== 'undefined') {
          try { await window.tronLink.request({ method: 'tron_requestAccounts' }); } catch(e) {}
          tw = window.tronWeb;
        } else if (typeof window.tronWeb !== 'undefined') {
          tw = window.tronWeb;
        } else {
          showConnectErr('❌ 未检测到 TronLink。\n请在 TronLink App 内置浏览器中打开此页面，或安装 TronLink 浏览器插件后刷新。');
          setStatus('off', '未连接'); return;
        }
      }

      /* TokenPocket — TRON 网络时注入 window.tronWeb */
      else if (type === 'tokenpocket') {
        // 新版 TP 可能暴露 window.tokenpocket
        if (typeof window.tokenpocket !== 'undefined' && window.tokenpocket.tron) {
          try { await window.tokenpocket.tron.request({ method: 'tron_requestAccounts' }); } catch(e) {}
          tw = window.tronWeb;
        } else if (typeof window.tronWeb !== 'undefined') {
          // TP 在 TRON 链时同样注入 tronWeb
          tw = window.tronWeb;
        } else {
          showConnectErr('❌ 未检测到 TokenPocket。\n请在 TokenPocket App 内置浏览器中打开此页面，并确保当前网络为 TRON。');
          setStatus('off', '未连接'); return;
        }
      }

      /* imToken — TRON 时注入 window.tronWeb；也可通过 imToken.callAPI */
      else if (type === 'imtoken') {
        if (typeof window.imToken !== 'undefined') {
          // 尝试触发账户授权
          try {
            await new Promise((resolve, reject) => {
              window.imToken.callAPI('navigator.getAccount',
                { chainType: 'TRON' },
                (err, res) => { if (err) reject(err); else resolve(res); }
              );
            });
          } catch(e) { /* 忽略，继续用 tronWeb */ }
          tw = window.tronWeb;
        } else if (typeof window.tronWeb !== 'undefined') {
          tw = window.tronWeb;
        } else {
          showConnectErr('❌ 未检测到 imToken。\n请在 imToken App 内置浏览器中打开此页面，并选择 TRON 账户。');
          setStatus('off', '未连接'); return;
        }
      }

      if (!tw || !tw.defaultAddress || !tw.defaultAddress.base58) {
        showConnectErr('❌ 钱包未解锁或拒绝授权。\n请在钱包弹窗中确认连接，然后重试。');
        setStatus('err', '授权失败'); return;
      }

      tronWeb = tw;
      currentAddress = tw.defaultAddress.base58;
      walletType = type;
      const names = { tronlink:'TronLink', tokenpocket:'TokenPocket', imtoken:'imToken' };
      setStatus('on', names[type] + '：' + currentAddress.slice(0,8) + '...' + currentAddress.slice(-6));
      document.getElementById('btn-' + type).classList.add('active');
      document.getElementById('badge-' + type).textContent = '✓ 已连接';
      document.getElementById('ownerAddr').value = currentAddress;
      document.getElementById('cardConfig').style.display = 'block';
      setStep(2);
      updatePreview();
      document.getElementById('cardConfig').scrollIntoView({ behavior: 'smooth' });

    } catch (e) {
      showConnectErr('❌ 连接失败：' + (e.message || e));
      setStatus('err', '连接失败');
    }
  }

  /* ── 预览 ── */
  function updatePreview() {
    const newAddr   = document.getElementById('newSigner').value.trim();
    const threshold = parseInt(document.getElementById('threshold').value);
    const weight    = parseInt(document.getElementById('weight').value);
    const permType  = document.getElementById('permType').value;
    const valid     = isTron(newAddr) && newAddr !== currentAddress;
    document.getElementById('btnSign').disabled = !valid;

    const ownerKey = { address: currentAddress || 'T...你的地址', weight: 1 };
    const newKey   = { address: valid ? newAddr : 'T...共签地址', weight: weight };
    const ops = '7fff1fc0037e0000000000000000000000000000000000000000000000000000';

    const struct = permType === 'active' ? {
      owner:   { type:0, permission_name:'owner',  threshold:1,         keys:[ownerKey] },
      actives: [{ type:2, permission_name:'active', threshold:threshold, operations:ops, keys:[ownerKey, newKey] }]
    } : {
      owner:   { type:0, permission_name:'owner',  threshold:threshold, keys:[ownerKey, newKey] },
      actives: [{ type:2, permission_name:'active', threshold:threshold, operations:ops, keys:[ownerKey, newKey] }]
    };

    document.getElementById('permPreview').textContent = JSON.stringify(struct, null, 2);
  }

  /* ── 构建交易并签名 ── */
  async function buildAndSign() {
    const newAddr   = document.getElementById('newSigner').value.trim();
    const threshold = parseInt(document.getElementById('threshold').value);
    const weight    = parseInt(document.getElementById('weight').value);
    const permType  = document.getElementById('permType').value;

    if (!isTron(newAddr)) { alert('请输入有效的 TRON 地址（T 开头，34位）'); return; }
    if (newAddr === currentAddress) { alert('不能填写自己的地址'); return; }

    const btn = document.getElementById('btnSign');
    btn.disabled = true;
    btn.textContent = '⏳ 请在钱包中确认签名...';

    try {
      const ownerKey = { address: currentAddress, weight: 1 };
      const newKey   = { address: newAddr, weight: weight };
      const ops = '7fff1fc0037e0000000000000000000000000000000000000000000000000000';

      let ownerPerm, activePerm;
      if (permType === 'active') {
        ownerPerm  = { type:0, permission_name:'owner',  threshold:1, keys:[ownerKey] };
        activePerm = [{ type:2, permission_name:'active', threshold:threshold, operations:ops, keys:[ownerKey, newKey] }];
      } else {
        ownerPerm  = { type:0, permission_name:'owner',  threshold:threshold, keys:[ownerKey, newKey] };
        activePerm = [{ type:2, permission_name:'active', threshold:threshold, operations:ops, keys:[ownerKey, newKey] }];
      }

      const tx     = await tronWeb.transactionBuilder.updateAccountPermissions(currentAddress, ownerPerm, null, activePerm);
      const signed = await tronWeb.trx.sign(tx);
      const result = await tronWeb.trx.sendRawTransaction(signed);

      document.getElementById('cardResult').style.display = 'block';
      setStep(3);
      const txEl = document.getElementById('txResult');

      if (result && result.result) {
        txEl.className = 'result show ok';
        txEl.textContent =
          '✅ 多签权限设置成功！\n\n' +
          'TxID:\n' + result.txid + '\n\n' +
          '共签地址：' + newAddr + '\n' +
          '门槛：' + threshold + '   新签名者权重：' + weight + '\n' +
          '权限类型：' + permType + '\n\n' +
          '在 TronScan 查看：\nhttps://tronscan.org/#/transaction/' + result.txid;
        setStatus('on', '✅ 多签设置完成');
      } else {
        txEl.className = 'result show bad';
        txEl.textContent = '❌ 广播失败：' + JSON.stringify(result);
        setStatus('err', '广播失败');
      }
      document.getElementById('cardResult').scrollIntoView({ behavior: 'smooth' });

    } catch (e) {
      document.getElementById('cardResult').style.display = 'block';
      document.getElementById('txResult').className = 'result show bad';
      document.getElementById('txResult').textContent = '❌ ' + (e.message || JSON.stringify(e));
      setStatus('err', '操作失败');
    }

    btn.disabled = false;
    btn.textContent = '📝 构建并发起签名请求';
  }

  function backToConfig() {
    document.getElementById('cardResult').style.display = 'none';
    setStep(2);
  }
</script>
</body>
</html>
