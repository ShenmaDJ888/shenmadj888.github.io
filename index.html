<script>
  let tronWeb = null;
  let myAddr = '';
  let builtTx = null;
  let currentWalletType = '';
  let isConnecting = false;

  const WALLET_DOM_MAP = {
    tronlink: {
      btn: 'b-tl',
      badge: 'bx-tl',
      label: 'TronLink'
    },
    tokenpocket: {
      btn: 'b-tp',
      badge: 'bx-tp',
      label: 'TokenPocket'
    },
    imtoken: {
      btn: 'b-im',
      badge: 'bx-im',
      label: 'imToken'
    }
  };

  function log(...args) {
    const text = args.map(v => {
      if (typeof v === 'string') return v;
      try { return JSON.stringify(v, null, 2); } catch (e) { return String(v); }
    }).join(' ');
    console.log('[DEBUG]', ...args);

    const el = document.getElementById('debugLog');
    if (el) {
      const time = new Date().toLocaleTimeString();
      el.textContent += `[${time}] ${text}\n`;
      el.scrollTop = el.scrollHeight;
    }
  }

  function clearDebug() {
    const el = document.getElementById('debugLog');
    if (el) el.textContent = '';
  }

  function setSt(type, text) {
    const sbar = document.getElementById('sbar');
    const dot = document.getElementById('dot');
    const stxt = document.getElementById('stxt');

    if (sbar) sbar.className = 'sbar ' + type;
    if (dot) dot.className = 'dot ' + (type === 'on' ? 'gr' : type === 'err' ? 'r' : 'g');
    if (stxt) stxt.textContent = text;
  }

  function setStep(n) {
    ['s1', 's2', 's3'].forEach((id, i) => {
      const el = document.getElementById(id);
      if (el) {
        el.className = 'st ' + (i + 1 < n ? 'done' : i + 1 === n ? 'active' : '');
      }
    });
  }

  function isTron(a) {
    return /^T[A-Za-z0-9]{33}$/.test(a);
  }

  function showErr(m) {
    const e = document.getElementById('cErr');
    if (e) {
      e.textContent = m;
      e.className = 'result bad show';
    }
    log('ERROR:', m);
  }

  function clearErr() {
    const e = document.getElementById('cErr');
    if (e) {
      e.textContent = '';
      e.className = 'result bad';
    }
  }

  function shortAddr(addr) {
    if (!addr) return '';
    return addr.slice(0, 8) + '…' + addr.slice(-6);
  }

  function typeLabel(type) {
    return WALLET_DOM_MAP[type]?.label || type;
  }

  function resetWalletButtons() {
    Object.values(WALLET_DOM_MAP).forEach(item => {
      const btn = document.getElementById(item.btn);
      const badge = document.getElementById(item.badge);

      if (btn) btn.classList.remove('active');
      if (badge) badge.textContent = '连接';
    });
  }

  function setWalletButtonActive(type) {
    resetWalletButtons();

    const cfg = WALLET_DOM_MAP[type];
    if (!cfg) return;

    const btn = document.getElementById(cfg.btn);
    const badge = document.getElementById(cfg.badge);

    if (btn) btn.classList.add('active');
    if (badge) badge.textContent = '✓ 已连接';
  }

  function getInjectedTronWeb() {
    if (window.tronWeb) return window.tronWeb;
    return null;
  }

  async function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function waitForTronWeb(timeout = 12000, interval = 400) {
    const start = Date.now();
    let round = 0;

    while (Date.now() - start < timeout) {
      round++;
      const tw = getInjectedTronWeb();
      const addr = tw && tw.defaultAddress ? tw.defaultAddress.base58 : '';

      log(`轮询注入 第 ${round} 次`, {
        hasTronWeb: !!tw,
        ready: tw ? tw.ready : undefined,
        address: addr || ''
      });

      if (tw && tw.defaultAddress && tw.defaultAddress.base58) {
        return tw;
      }

      await sleep(interval);
    }

    return null;
  }

  async function requestTronLinkAccounts() {
    if (window.tronLink && typeof window.tronLink.request === 'function') {
      log('检测到 tronLink.request，开始请求授权');
      try {
        const res = await window.tronLink.request({ method: 'tron_requestAccounts' });
        log('tronLink.request 返回：', res);
      } catch (e) {
        log('tronLink.request 异常：', e.message || e);
      }
    } else {
      log('未检测到 tronLink.request');
    }
  }

  async function requestTokenPocketAccounts() {
    if (window.tokenpocket && window.tokenpocket.tron && typeof window.tokenpocket.tron.request === 'function') {
      log('检测到 tokenpocket.tron.request，开始请求授权');
      try {
        const res = await window.tokenpocket.tron.request({ method: 'tron_requestAccounts' });
        log('tokenpocket.tron.request 返回：', res);
      } catch (e) {
        log('tokenpocket.tron.request 异常：', e.message || e);
      }
    } else {
      log('未检测到 tokenpocket.tron.request');
    }
  }

  async function requestImTokenAccounts() {
    if (window.imToken && typeof window.imToken.callAPI === 'function') {
      log('检测到 imToken.callAPI，开始请求账户');
      try {
        const res = await new Promise((resolve, reject) => {
          window.imToken.callAPI('navigator.getAccount', { chainType: 'TRON' }, (err, data) => {
            if (err) reject(err);
            else resolve(data);
          });
        });
        log('imToken.getAccount 返回：', res);
      } catch (e) {
        log('imToken.getAccount 异常：', e.message || e);
      }
    } else {
      log('未检测到 imToken.callAPI');
    }
  }

  function getWalletEnvTips(type) {
    return {
      tronlink: '请确认在 Chrome + TronLink 插件，或 TronLink App DApp 浏览器中打开。',
      tokenpocket: '请确认在 TokenPocket App 的 DApp 浏览器中打开，不要在系统浏览器中测试。',
      imtoken: '请确认在 imToken App 的 DApp 浏览器中打开，并已切换到 TRON。'
    }[type] || '请确认当前环境支持 TRON 钱包注入。';
  }

  async function resolveWallet(type) {
    log('开始解析钱包类型：', type);

    if (type === 'tronlink') {
      await requestTronLinkAccounts();
    } else if (type === 'tokenpocket') {
      await requestTokenPocketAccounts();
    } else if (type === 'imtoken') {
      await requestImTokenAccounts();
    }

    let tw = getInjectedTronWeb();
    log('首次读取 window.tronWeb：', {
      exists: !!tw,
      ready: tw ? tw.ready : undefined,
      defaultAddress: tw && tw.defaultAddress ? tw.defaultAddress : null
    });

    if (tw && tw.defaultAddress && tw.defaultAddress.base58) {
      return tw;
    }

    tw = await waitForTronWeb(12000, 400);
    return tw;
  }

  function applyConnectedWallet(type, tw) {
    tronWeb = tw;
    myAddr = tw.defaultAddress.base58;
    currentWalletType = type;

    const owner = document.getElementById('owner');
    const cConfig = document.getElementById('cConfig');

    if (owner) owner.value = myAddr;
    if (cConfig) cConfig.style.display = 'block';

    setWalletButtonActive(type);
    setSt('on', typeLabel(type) + '：' + shortAddr(myAddr));
    setStep(2);

    log('钱包连接成功：', {
      type,
      address: myAddr,
      ready: tw.ready
    });

    onInput();

    setTimeout(() => {
      if (cConfig) {
        cConfig.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 100);
  }

  async function connect(type) {
    if (isConnecting) {
      log('当前正在连接中，忽略重复点击');
      return;
    }

    isConnecting = true;
    clearErr();
    resetWalletButtons();
    setSt('off', '连接中…');
    log('========== 开始连接 ==========');
    log('目标钱包：', type);

    try {
      const tw = await resolveWallet(type);

      if (!tw) {
        throw new Error('未检测到可用的 window.tronWeb。' + getWalletEnvTips(type));
      }

      if (!tw.defaultAddress || !tw.defaultAddress.base58) {
        throw new Error('检测到了 tronWeb，但没有拿到地址。请先在钱包中解锁并授权当前站点。');
      }

      if (!isTron(tw.defaultAddress.base58)) {
        throw new Error('当前拿到的地址不是合法 TRON 地址：' + tw.defaultAddress.base58);
      }

      applyConnectedWallet(type, tw);
    } catch (e) {
      tronWeb = null;
      myAddr = '';
      currentWalletType = '';
      builtTx = null;

      const owner = document.getElementById('owner');
      const cConfig = document.getElementById('cConfig');

      if (owner) owner.value = '';
      if (cConfig) cConfig.style.display = 'none';

      showErr('❌ 连接失败：' + (e.message || e));
      setSt('err', '连接失败');
      log('连接异常完整对象：', e);
    } finally {
      isConnecting = false;
      refreshEnv();
      log('========== 连接结束 ==========');
    }
  }

  async function onInput() {
    const newAddrEl = document.getElementById('newSigner');
    const thresholdEl = document.getElementById('threshold');
    const weightEl = document.getElementById('weight');
    const permTypeEl = document.getElementById('permType');
    const btnSign = document.getElementById('btnSign');
    const txidPreview = document.getElementById('txidPreview');

    if (!newAddrEl || !thresholdEl || !weightEl || !permTypeEl || !btnSign || !txidPreview) {
      return;
    }

    const newAddr   = newAddrEl.value.trim();
    const threshold = parseInt(thresholdEl.value, 10);
    const weight    = parseInt(weightEl.value, 10);
    const permType  = permTypeEl.value;
    const valid     = isTron(newAddr) && newAddr !== myAddr;

    btnSign.disabled = !valid;
    builtTx = null;

    if (!valid || !tronWeb) {
      txidPreview.textContent = '填写有效的共签地址后自动生成…';
      return;
    }

    try {
      const tx = await buildTx(myAddr, newAddr, threshold, weight, permType);
      builtTx = tx;
      txidPreview.textContent = tx.txID;
      log('交易构建成功：', tx);
    } catch (e) {
      txidPreview.textContent = '构建失败：' + (e.message || e);
      log('交易构建失败：', e);
    }
  }

  async function buildTx(owner, newAddr, threshold, weight, permType) {
    const ownerKey = { address: owner, weight: 1 };
    const newKey = { address: newAddr, weight: weight };
    const ops = '7fff1fc0037e0000000000000000000000000000000000000000000000000000';

    let ownerPerm, activePerm;

    if (permType === 'active') {
      ownerPerm = {
        type: 0,
        permission_name: 'owner',
        threshold: 1,
        keys: [ownerKey]
      };
      activePerm = [{
        type: 2,
        permission_name: 'active',
        threshold: threshold,
        operations: ops,
        keys: [ownerKey, newKey]
      }];
    } else {
      ownerPerm = {
        type: 0,
        permission_name: 'owner',
        threshold: threshold,
        keys: [ownerKey, newKey]
      };
      activePerm = [{
        type: 2,
        permission_name: 'active',
        threshold: threshold,
        operations: ops,
        keys: [ownerKey, newKey]
      }];
    }

    log('准备调用 updateAccountPermissions 参数：', {
      owner,
      ownerPerm,
      activePerm
    });

    return await tronWeb.transactionBuilder.updateAccountPermissions(
      owner,
      ownerPerm,
      null,
      activePerm
    );
  }

  async function doSignAndBroadcast() {
    if (!builtTx) {
      alert('请先填写有效的共签地址');
      return;
    }

    const btn = document.getElementById('btnSign');
    if (btn) {
      btn.disabled = true;
      btn.textContent = '⏳ 请在钱包中确认签名…';
    }

    log('开始签名并广播');

    try {
      if (!tronWeb || !myAddr) {
        throw new Error('钱包未连接，请重新连接钱包');
      }

      let signedTx = null;

      try {
        log('尝试签名方式1：tronWeb.trx.sign(txObject)');
        signedTx = await tronWeb.trx.sign(builtTx);
        log('签名方式1成功：', signedTx);
      } catch (e1) {
        log('签名方式1失败：', e1.message || e1);

        try {
          log('尝试签名方式2：tronWeb.trx.sign(txID)');
          const signature = await tronWeb.trx.sign(builtTx.txID);
          signedTx = {
            ...builtTx,
            signature: [String(signature).replace(/^0x/, '')]
          };
          log('签名方式2成功：', signedTx);
        } catch (e2) {
          log('签名方式2失败：', e2.message || e2);
          throw new Error('两种签名方式都失败：' + (e2.message || e2));
        }
      }

      if (!signedTx || !signedTx.signature || !signedTx.signature.length) {
        throw new Error('钱包没有返回有效签名');
      }

      log('准备广播交易：', signedTx);
      const result = await tronWeb.trx.sendRawTransaction(signedTx);
      log('广播结果：', result);

      const cResult = document.getElementById('cResult');
      const el = document.getElementById('txResult');
      const newSignerEl = document.getElementById('newSigner');
      const thresholdEl = document.getElementById('threshold');
      const weightEl = document.getElementById('weight');
      const permTypeEl = document.getElementById('permType');

      if (cResult) cResult.style.display = 'block';
      setStep(3);

      if (result && result.result) {
        if (el) {
          el.className = 'result show ok';
          el.textContent =
            '✅ 多签权限设置成功！\n\n' +
            'TxID:\n' + result.txid + '\n\n' +
            '共签地址：' + (newSignerEl ? newSignerEl.value.trim() : '') + '\n' +
            '门槛：' + (thresholdEl ? thresholdEl.value : '') +
            '   权重：' + (weightEl ? weightEl.value : '') + '\n' +
            '权限类型：' + (permTypeEl ? permTypeEl.value : '') + '\n\n' +
            'TronScan:\nhttps://tronscan.org/#/transaction/' + result.txid;
        }
        setSt('on', '✅ 多签设置完成');
      } else {
        if (el) {
          el.className = 'result show bad';
          el.textContent = '❌ 广播失败：\n' + JSON.stringify(result, null, 2);
        }
        setSt('err', '广播失败');
      }

      if (cResult) cResult.scrollIntoView({ behavior: 'smooth' });
    } catch (e) {
      const cResult = document.getElementById('cResult');
      const el = document.getElementById('txResult');

      if (cResult) cResult.style.display = 'block';
      if (el) {
        el.className = 'result show bad';
        el.textContent = '❌ ' + (e.message || JSON.stringify(e));
      }
      setSt('err', '操作失败');
      log('签名/广播异常：', e);
    } finally {
      if (btn) {
        btn.disabled = false;
        btn.textContent = '✍️ 签名并上链';
      }
    }
  }

  function back() {
    const cResult = document.getElementById('cResult');
    if (cResult) cResult.style.display = 'none';
    setStep(2);
  }

  function refreshEnv() {
    const tw = window.tronWeb;
    const tl = window.tronLink;
    const tp = window.tokenpocket;
    const im = window.imToken;
    const envBox = document.getElementById('envBox');

    const info = [
      'URL: ' + location.href,
      'UA: ' + navigator.userAgent,
      'window.tronWeb: ' + (!!tw),
      'window.tronLink: ' + (!!tl),
      'window.tokenpocket: ' + (!!tp),
      'window.imToken: ' + (!!im),
      'tronWeb.ready: ' + (tw ? tw.ready : 'N/A'),
      'tronWeb.defaultAddress.base58: ' + (tw && tw.defaultAddress ? (tw.defaultAddress.base58 || '') : ''),
      'tronWeb.defaultAddress.hex: ' + (tw && tw.defaultAddress ? (tw.defaultAddress.hex || '') : '')
    ].join('\n');

    if (envBox) envBox.textContent = info;

    log('刷新环境检测：', {
      hasTronWeb: !!tw,
      hasTronLink: !!tl,
      hasTokenPocket: !!tp,
      hasImToken: !!im,
      ready: tw ? tw.ready : undefined,
      base58: tw && tw.defaultAddress ? tw.defaultAddress.base58 : ''
    });
  }

  function handleWalletChanged() {
    const tw = getInjectedTronWeb();
    if (!tw || !tw.defaultAddress || !tw.defaultAddress.base58) return;

    const latest = tw.defaultAddress.base58;
    if (myAddr && latest !== myAddr) {
      log('检测到账户变化：', { old: myAddr, new: latest });
      tronWeb = tw;
      myAddr = latest;

      const owner = document.getElementById('owner');
      if (owner) owner.value = myAddr;

      setSt('on', typeLabel(currentWalletType || 'tronlink') + '：' + shortAddr(myAddr));
      onInput();
      refreshEnv();
    }
  }

  function bindWalletEvents() {
    window.addEventListener('tronLink#initialized', () => {
      log('收到 tronLink#initialized 事件');
      refreshEnv();
    });

    window.addEventListener('message', (event) => {
      const msg = event.data;
      if (!msg) return;

      if (msg.message && (msg.message.action === 'setAccount' || msg.message.action === 'accountsChanged')) {
        log('收到钱包消息事件：', msg);
        handleWalletChanged();
      }
    });

    setInterval(() => {
      handleWalletChanged();
    }, 1500);
  }

  window.addEventListener('load', () => {
    log('页面已加载');
    refreshEnv();
  });

  bindWalletEvents();
</script>
