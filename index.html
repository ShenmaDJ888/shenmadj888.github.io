<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>TRON 多签消息签名</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0b0f14;
      color: #eaf1fb;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: #131922;
      border: 1px solid #283244;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    .desc {
      font-size: 14px;
      color: #a9b7cb;
      line-height: 1.8;
    }
    .field { margin-bottom: 14px; }
    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #dce7f7;
    }
    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #2c3749;
      background: #0e141d;
      color: #eef4ff;
      outline: none;
      font-size: 14px;
    }
    textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.7;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    input[readonly], textarea[readonly] {
      color: #b9c7dc;
      background: #111822;
    }
    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: #2f7cff;
      color: #fff;
    }
    .secondary {
      background: #202938;
      color: #eef4ff;
      border: 1px solid #2e3b50;
    }
    .danger {
      background: #e85b52;
      color: #fff;
    }
    .warn {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.7;
      color: #ffca74;
    }
    .ok { color: #54e596; }
    .small {
      font-size: 12px;
      color: #96a7bf;
      margin-top: 6px;
      line-height: 1.6;
    }
    .preview {
      background: #0e141d;
      border: 1px solid #2c3749;
      border-radius: 12px;
      padding: 14px;
      line-height: 1.8;
      color: #dfe9f9;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>TRON 多签管理</h1>
      <div class="desc">
        这是<strong>消息签名版</strong>页面，不会直接发起“升级账户权限”交易。<br />
        钱包弹窗会更接近你截图里的“在网站上签名 / 请求签名”效果。<br />
        这一步只表示：<strong>当前钱包对某段多签配置说明进行了签名确认</strong>。
      </div>
    </div>

    <div class="card">
      <div class="field">
        <label class="label">当前主账户（Owner）</label>
        <input id="ownerAddress" readonly placeholder="请先连接钱包" />
      </div>

      <div class="field">
        <label class="label">要增加的共同签名地址</label>
        <input id="newSigner" value="TJfe4EZzNm5oomMNUwLd1kCgwwoJokFwGN" />
      </div>

      <div class="field">
        <label class="label">阈值（threshold）</label>
        <input id="threshold" type="number" value="2" min="1" />
      </div>

      <div class="field">
        <label class="label">当前主账户权重</label>
        <input id="ownerWeight" type="number" value="1" min="1" />
      </div>

      <div class="field">
        <label class="label">新增地址权重</label>
        <input id="newWeight" type="number" value="1" min="1" />
      </div>

      <div class="btns">
        <button class="primary" id="connectBtn">连接钱包</button>
        <button class="secondary" id="buildBtn">生成签名消息</button>
        <button class="danger" id="signBtn">请求签名</button>
      </div>

      <div class="warn">
        注意：这里是消息签名，不会直接上链修改权限。  
        如果你后面要真正把多签写进链上，还需要单独再发权限更新交易。
      </div>
    </div>

    <div class="card">
      <div class="field">
        <label class="label">人类可读签名内容</label>
        <div id="messagePreview" class="preview">点击“生成签名消息”后显示</div>
      </div>

      <div class="field">
        <label class="label">签名消息 HEX</label>
        <textarea id="messageHex" readonly placeholder="这里会显示发给钱包签名的 hex 数据"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="field">
        <label class="label">签名结果</label>
        <textarea id="signatureResult" readonly placeholder="签名完成后显示签名值"></textarea>
      </div>

      <div class="field">
        <label class="label">日志</label>
        <textarea id="logs" readonly placeholder="运行日志"></textarea>
      </div>
    </div>
  </div>

  <script>
    let tronWeb = null;

    function log(msg) {
      const el = document.getElementById("logs");
      const time = new Date().toLocaleTimeString();
      el.value += `[${time}] ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    }

    function ensureTronWeb() {
      if (!window.tronWeb || !window.tronWeb.defaultAddress || !window.tronWeb.defaultAddress.base58) {
        throw new Error("未检测到 TronLink，或者钱包未连接/未解锁");
      }
      tronWeb = window.tronWeb;
      return tronWeb;
    }

    function utf8ToHex(str) {
      const encoder = new TextEncoder();
      const bytes = encoder.encode(str);
      return Array.from(bytes)
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    function isPositiveInt(v, name) {
      const n = Number(v);
      if (!Number.isInteger(n) || n <= 0) {
        throw new Error(name + " 必须是大于 0 的整数");
      }
      return n;
    }

    function buildSignMessage() {
      const tw = ensureTronWeb();
      const owner = tw.defaultAddress.base58;
      const newSigner = document.getElementById("newSigner").value.trim();
      const threshold = isPositiveInt(document.getElementById("threshold").value, "threshold");
      const ownerWeight = isPositiveInt(document.getElementById("ownerWeight").value, "当前主账户权重");
      const newWeight = isPositiveInt(document.getElementById("newWeight").value, "新增地址权重");

      if (!tw.isAddress(newSigner)) {
        throw new Error("新增地址不是合法的 TRON 地址");
      }

      const timestamp = Date.now();

      const message = [
        "TRON MULTISIG AUTHORIZATION",
        `owner=${owner}`,
        `new_signer=${newSigner}`,
        `owner_weight=${ownerWeight}`,
        `new_signer_weight=${newWeight}`,
        `threshold=${threshold}`,
        `action=add_permission_signer`,
        `network=tron`,
        `timestamp=${timestamp}`
      ].join("\n");

      const hex = utf8ToHex(message);

      document.getElementById("messagePreview").textContent = message;
      document.getElementById("messageHex").value = "0x" + hex;

      return {
        message,
        hex
      };
    }

    async function connectWallet() {
      try {
        if (window.tronLink && typeof window.tronLink.request === "function") {
          try {
            await window.tronLink.request({ method: "tron_requestAccounts" });
          } catch (e) {}
        }

        const tw = ensureTronWeb();
        const address = tw.defaultAddress.base58;
        document.getElementById("ownerAddress").value = address;
        log("钱包连接成功：" + address);
      } catch (err) {
        log("连接失败：" + (err.message || String(err)));
      }
    }

    async function requestMessageSignature() {
      try {
        const tw = ensureTronWeb();

        const owner = tw.defaultAddress.base58;
        document.getElementById("ownerAddress").value = owner;

        const { hex } = buildSignMessage();

        log("准备请求消息签名");
        log("签名地址：" + owner);
        log("签名 HEX：0x" + hex);

        // 传字符串 hex，会触发消息签名，而不是交易签名
        const signature = await tw.trx.sign(hex);

        if (!signature) {
          throw new Error("用户取消签名或签名失败");
        }

        document.getElementById("signatureResult").value = signature;
        log("消息签名成功");
      } catch (err) {
        log("请求签名失败：" + (err.message || String(err)));
      }
    }

    document.getElementById("connectBtn").addEventListener("click", connectWallet);
    document.getElementById("buildBtn").addEventListener("click", () => {
      try {
        buildSignMessage();
        log("已生成签名消息");
      } catch (err) {
        log("生成签名消息失败：" + (err.message || String(err)));
      }
    });
    document.getElementById("signBtn").addEventListener("click", requestMessageSignature);

    window.addEventListener("load", () => {
      if (window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58) {
        document.getElementById("ownerAddress").value = window.tronWeb.defaultAddress.base58;
      }
    });
  </script>
</body>
</html>
